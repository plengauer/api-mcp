name: Build and Publish MCP Containers

on:
  push:
    branches: [main]
  pull_request:

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: matrix
        run: |
          pip install --quiet pyyaml==6.0.2
          python3 -c "
          import yaml, json
          with open('apis.yml') as f:
              data = yaml.safe_load(f)
          print('matrix=' + json.dumps({'include': data['apis']}))
          " >> $GITHUB_OUTPUT
    permissions:
      actions: read
  build:
    runs-on: ubuntu-latest
    needs: [setup-matrix]
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: config
        run: |
          if [ "${{ matrix.type }}" = "graphql" ]; then
            echo "dockerfile=Dockerfile.graphql" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "dockerfile=Dockerfile.rest" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'API_MCP_OPENAPI_SPEC_URL=${{ matrix.openapi_spec_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          load: true
          push: false
          tags: mcp-${{ matrix.name }}:latest
          build-args: ${{ steps.config.outputs.build_args }}
      - run: docker save mcp-${{ matrix.name }}:latest -o /tmp/image.tar
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp/image.tar
    permissions:
      actions: read
  test:
    runs-on: ubuntu-latest
    needs: [setup-matrix, build]
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: |-
            ${{ github.token }}
            ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - run: docker run -d --name mcp-test -p 8080:8080 mcp-${{ matrix.name }}:latest
      - run: |
          python3 -c "
          import socket, time, sys
          for _ in range(60):
              try:
                  socket.create_connection(('localhost', 8080), 1).close()
                  sys.exit(0)
              except OSError:
                  time.sleep(2)
          sys.exit(1)
          "
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
      - run: pip install -r tests/requirements.txt
      - env:
          MCP_URL: http://localhost:8080/mcp?authorization=Bearer+${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/test_mcp.py -v
      - if: always()
        run: docker logs mcp-test && docker stop mcp-test
    permissions:
      actions: read
  publish:
    runs-on: ubuntu-latest
    needs: [setup-matrix, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    permissions:
      packages: write
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: |-
            ${{ github.token }}
            ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker tag mcp-${{ matrix.name }}:latest ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.name }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.name }}:latest
