name: Build and Publish MCP Containers

on:
  push:
    branches: [main]
  pull_request:

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: matrix
        run: |
          pip install --quiet pyyaml==6.0.2
          python3 -c "
          import yaml, json
          with open('apis.yml') as f:
              data = yaml.safe_load(f)
          print('matrix=' + json.dumps({'include': data['apis']}))
          " >> $GITHUB_OUTPUT
    permissions:
      actions: read
  build:
    runs-on: ubuntu-latest
    needs: [setup-matrix]
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: config
        run: |
          if [ "${{ matrix.type }}" = "graphql" ]; then
            echo "dockerfile=Dockerfile.graphql" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "dockerfile=Dockerfile.rest" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'API_MCP_OPENAPI_SPEC_URL=${{ matrix.openapi_spec_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          load: true
          push: false
          tags: mcp-${{ matrix.name }}:latest
          build-args: ${{ steps.config.outputs.build_args }}
      - run: docker save mcp-${{ matrix.name }}:latest -o /tmp/image.tar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-${{ matrix.name }}
          path: /tmp/image.tar
    permissions:
      actions: read
  test:
    runs-on: ubuntu-latest
    needs: [setup-matrix, build]
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: image-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - run: docker run -d --name mcp-test -p 8080:8080 mcp-${{ matrix.name }}:latest
      - run: |
          python3 -c "
          import socket, time, sys
          for _ in range(60):
              try:
                  socket.create_connection(('localhost', 8080), 1).close()
                  sys.exit(0)
              except OSError:
                  time.sleep(2)
          sys.exit(1)
          "
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - run: pip install -r tests/requirements.txt
      - env:
          MCP_URL: http://localhost:8080/mcp?authorization=Bearer+${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/test_mcp.py -v
      - if: always()
        run: docker logs mcp-test && docker stop mcp-test
    permissions:
      actions: read
  test-github:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        include:
          - name: github-rest
          - name: github-graphql
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: image-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - run: docker run -d --name mcp-test-github -p 8080:8080 mcp-${{ matrix.name }}:latest
      - run: |
          python3 -c "
          import socket, time, sys
          for _ in range(120):
              try:
                  socket.create_connection(('localhost', 8080), 1).close()
                  sys.exit(0)
              except OSError:
                  time.sleep(2)
          sys.exit(1)
          "
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - run: pip install -r tests/requirements.txt
      - env:
          MCP_URL: http://localhost:8080/mcp?authorization=Bearer+${{ github.token }}
        run: pytest tests/test_github.py -v
      - if: always()
        run: docker logs mcp-test-github && docker stop mcp-test-github
    permissions:
      actions: read
  publish:
    runs-on: ubuntu-latest
    needs: [setup-matrix, test, test-github]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    permissions:
      packages: write
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: |-
            ${{ github.token }}
            ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: image-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker tag mcp-${{ matrix.name }}:latest ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.name }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.name }}:latest
