name: Build and Publish MCP Containers

on:
  push:
    branches: [main]
  pull_request:

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - id: matrix
        run: |
          pip install --quiet pyyaml==6.0.2
          python3 -c "
          import yaml, json
          with open('apis.yml') as f:
              data = yaml.safe_load(f)
          print('matrix=' + json.dumps({'include': data['apis']}))
          " >> $GITHUB_OUTPUT
    permissions:
      actions: read
  build:
    runs-on: ubuntu-latest
    needs: [setup-matrix]
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - id: config
        run: |
          if [ "${{ matrix.type }}" = "graphql" ]; then
            echo "dockerfile=Dockerfile.graphql" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "dockerfile=Dockerfile.rest" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'API_MCP_OPENAPI_SPEC_URL=${{ matrix.openapi_spec_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          load: true
          push: false
          tags: mcp-${{ matrix.name }}:latest
          build-args: ${{ steps.config.outputs.build_args }}
      - run: docker save mcp-${{ matrix.name }}:latest -o /tmp/image.tar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-${{ matrix.name }}
          path: /tmp/image.tar
    permissions:
      actions: read
  test:
    runs-on: ubuntu-latest
    needs: [setup-matrix, build]
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: image-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - run: docker run -d --name mcp-test -p 8080:8080 mcp-${{ matrix.name }}:latest
      - run: |
          python3 -c "
          import socket, time, sys
          for _ in range(60):
              try:
                  socket.create_connection(('localhost', 8080), 1).close()
                  sys.exit(0)
              except OSError:
                  time.sleep(2)
          sys.exit(1)
          "
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
      - run: pip install -r tests/requirements.txt
      - env:
          MCP_URL: http://localhost:8080/mcp?authorization=Bearer+${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/test_mcp.py -v
      - if: always()
        run: docker logs mcp-test && docker stop mcp-test
    permissions:
      actions: read
  test-github:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        include:
          - name: rest
          - name: graphql
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: image-github-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - run: docker run -d --name mcp-test-github -p 8080:8080 mcp-github-${{ matrix.name }}:latest
      - run: |
          python3 -c "
          import socket, time, sys
          for _ in range(120):
              try:
                  socket.create_connection(('localhost', 8080), 1).close()
                  sys.exit(0)
              except OSError:
                  time.sleep(2)
          sys.exit(1)
          "
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
      - run: pip install -r tests/requirements.txt
      - env:
          MCP_STDIO_IMAGE: mcp-github-${{ matrix.name }}:latest
          MCP_URL: http://localhost:8080/mcp?authorization=Bearer+${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from urllib.parse import parse_qs, unquote_plus, urlparse
          
          query = parse_qs(urlparse(os.environ["MCP_URL"]).query)
          auth_values = query.get("authorization", [])
          auth = unquote_plus(auth_values[0]) if auth_values else ""
          
          proc = subprocess.Popen(
              [
                  "docker",
                  "run",
                  "--rm",
                  "-i",
                  "-e",
                  "API_MCP_MODE=stdio",
                  "-e",
                  f"HTTP_AUTHORIZATION={auth}",
                  os.environ["MCP_STDIO_IMAGE"],
              ],
              stdin=subprocess.PIPE,
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
          )
          
          try:
              try:
                  returncode = proc.wait(timeout=(60 * 10))
              except subprocess.TimeoutExpired:
                  returncode = None
          
              if returncode is not None:
                  raise AssertionError(
                      f"stdio image exited early with code {returncode}"
                  )
          
              proc.stdin.close()
              try:
                  returncode = proc.wait(timeout=30)
                  if returncode != 0:
                      raise AssertionError(
                          f"stdio image exited with code {returncode} after stdin close"
                      )
              except subprocess.TimeoutExpired as e:
                  raise AssertionError(
                      "stdio image did not exit within 30s after stdin close"
                  ) from e
          finally:
              if proc.poll() is None:
                  proc.terminate()
                  try:
                      proc.wait(timeout=5)
                  except subprocess.TimeoutExpired:
                      proc.kill()
                      proc.wait(timeout=5)
          PY
      - env:
          MCP_URL: http://localhost:8080/mcp?authorization=Bearer+${{ secrets.GITHUB_TOKEN }}
          MCP_STDIO_IMAGE: mcp-github-${{ matrix.name }}
        run: pytest tests/test_github.py -v
      - if: always()
        run: docker logs mcp-test-github && docker stop mcp-test-github
    permissions:
      actions: read
  test-all:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [ test, test-github ]
    permissions: {}
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1          
  publish:
    runs-on: ubuntu-latest
    needs: [setup-matrix, test-all]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    permissions:
      packages: write
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@215271fe54efbdffbece78b02493f7ecd73678f8
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: |-
            ${{ github.token }}
            ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: image-${{ matrix.name }}
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker tag mcp-${{ matrix.name }}:latest ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.name }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.name }}:latest
