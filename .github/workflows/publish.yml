name: Build and Publish MCP Containers

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-rest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/requirements.txt
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/test_rest_mcp.py -v

  test-graphql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/requirements.txt
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/test_graphql_mcp.py -v

  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: |
          pip install --quiet pyyaml==6.0.2
          python3 -c "
          import yaml, json
          with open('apis.yml') as f:
              data = yaml.safe_load(f)
          print('matrix=' + json.dumps({'include': data['apis']}))
          " >> $GITHUB_OUTPUT

  publish:
    runs-on: ubuntu-latest
    needs: [test-rest, test-graphql, setup-matrix]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: config
        run: |
          if [ "${{ matrix.type }}" = "graphql" ]; then
            echo "dockerfile=Dockerfile.graphql" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "dockerfile=Dockerfile.rest" >> $GITHUB_OUTPUT
            {
              echo 'build_args<<EOF'
              echo 'API_MCP_SERVER_NAME=${{ matrix.server_name }}'
              echo 'API_MCP_BASE_URL=${{ matrix.base_url }}'
              echo 'API_MCP_OPENAPI_SPEC_URL=${{ matrix.openapi_spec_url }}'
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}-mcp:latest
          build-args: ${{ steps.config.outputs.build_args }}
