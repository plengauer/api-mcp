FROM python:3.12-slim

WORKDIR /app

RUN pip install --no-cache-dir graphql-mcp uvicorn

COPY api-graphql-mcp.py .

ARG API_MCP_BASE_URL
ARG API_MCP_SERVER_NAME

ENV API_MCP_BASE_URL=${API_MCP_BASE_URL}
ENV API_MCP_SERVER_NAME=${API_MCP_SERVER_NAME}

EXPOSE 8000

CMD ["python", "api-graphql-mcp.py"]
