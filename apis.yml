apis:
  - name: github-rest
    type: rest
    server_name: GitHub REST API
    openapi_spec_url: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.json
    base_url: https://api.github.com

  - name: github-graphql
    type: graphql
    server_name: GitHub GraphQL API
    base_url: https://api.github.com/graphql

  - name: discord
    type: rest
    server_name: Discord API
    openapi_spec_url: https://raw.githubusercontent.com/discord/discord-api-spec/main/specs/openapi.json
    base_url: https://discord.com/api/v10
